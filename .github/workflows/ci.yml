name: CI

# Single lint+test+build path (see project-brief.md's degrade-gracefully
# order: drop the CI matrix before dropping any of lint/test/build). No
# registry push - infra/terraform's ECR repo is a stub, not applied, so
# there's nowhere to push to yet; this just proves all four images build.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    # Backs tests/test_db_integration.py's upsert-idempotency checks - the
    # only thing those tests need is a reachable Postgres; TEST_DATABASE_URL
    # below points them at this service instead of their localhost:5442
    # default (the docker-compose `postgres` service, not available here).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: health
          POSTGRES_PASSWORD: health
          POSTGRES_DB: health_pipeline
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U health -d health_pipeline"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+psycopg://health:health@localhost:5432/health_pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Check infra/requirements.txt matches uv.lock
        # Every Dockerfile installs from this file, not uv.lock directly (see its
        # own header) - catch drift here instead of only in a built image.
        run: |
          uv export --no-hashes --no-dev --format requirements-txt -o infra/requirements.txt
          git diff --exit-code -- infra/requirements.txt

      - name: Audit dependencies for known vulnerabilities
        # Audits the environment uv sync just installed (Python 3.12) rather
        # than re-resolving from infra/requirements.txt in a fresh env - the
        # latter picks whatever Python `uvx` defaults to, which doesn't
        # necessarily match this project's >=3.12 pin.
        run: uv run --with pip-audit pip-audit

      - name: Lint
        run: uv run ruff check .

      - name: Apply DB migrations
        run: uv run alembic -c warehouse/alembic.ini upgrade head
        env:
          DATABASE_URL: postgresql+psycopg://health:health@localhost:5432/health_pipeline

      - name: Test
        run: uv run pytest -q

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.app
          push: false
          tags: health-pipeline-api:ci

      - name: Build dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.dashboard
          push: false
          tags: health-pipeline-dashboard:ci

      - name: Build airflow image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.airflow
          push: false
          tags: health-pipeline-airflow:ci

      - name: Build mlflow image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.mlflow
          push: false
          tags: health-pipeline-mlflow:ci
