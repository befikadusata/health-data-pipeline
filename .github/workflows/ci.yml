name: CI

# Single lint+test+build path (see project-brief.md's degrade-gracefully
# order: drop the CI matrix before dropping any of lint/test/build). No
# registry push - infra/terraform's ECR repo is a stub, not applied, so
# there's nowhere to push to yet; this just proves the api image builds.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -q

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.app
          push: false
          tags: health-pipeline-api:ci
